apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluegreen-demo-green
  labels:
    app: bluegreen-demo
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bluegreen-demo
      version: green
  template:
    metadata:
      labels:
        app: bluegreen-demo
        version: green
    spec:
      containers:
      - name: app
        image: bluegreen-demo:v2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: VERSION
          value: "v2.0"
        - name: COLOR
          value: "green"
        - name: PORT
          value: "3000"
        # Load all configuration from ConfigMap
        envFrom:
        - configMapRef:
            name: bluegreen-demo-config-green
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      terminationGracePeriodSeconds: 30
