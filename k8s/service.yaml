apiVersion: v1
kind: Service
metadata:
  name: bluegreen-demo
  labels:
    app: bluegreen-demo
spec:
  type: LoadBalancer
  selector:
    app: bluegreen-demo
    version: blue  # Change this to 'green' to switch traffic
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None
